apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "vibed.fullname" . }}
  labels:
    {{- include "vibed.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "vibed.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "vibed.selectorLabels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "vibed.serviceAccountName" . }}
      containers:
        - name: vibed
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - "--config"
            - "/etc/vibed/vibed.yaml"
            - "--transport"
            - "http"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/targets
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/targets
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/vibed
              readOnly: true
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: /data/vibed
            {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "vibed.fullname" . }}-config
        {{- if .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "vibed.fullname" . }}-data
        {{- end }}
