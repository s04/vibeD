{{- if .Values.knative.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-install-knative
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/component: knative-installer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 3
  template:
    spec:
      serviceAccountName: {{ .Release.Name }}-installer
      restartPolicy: OnFailure
      containers:
        - name: install
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Installing Knative Serving CRDs..."
              kubectl apply -f https://github.com/knative/serving/releases/download/knative-{{ .Values.knative.version }}/serving-crds.yaml
              echo "Installing Knative Serving core..."
              kubectl apply -f https://github.com/knative/serving/releases/download/knative-{{ .Values.knative.version }}/serving-core.yaml
              echo "Waiting for Knative Serving..."
              kubectl wait --for=condition=Available deployment --all -n knative-serving --timeout=180s
              echo "Installing Kourier..."
              kubectl apply -f https://github.com/knative/net-kourier/releases/download/knative-{{ .Values.knative.version }}/kourier.yaml
              kubectl wait --for=condition=Available deployment --all -n kourier-system --timeout=120s
              echo "Configuring Knative..."
              kubectl patch configmap/config-network -n knative-serving \
                --type merge -p '{"data":{"ingress-class":"kourier.ingress.networking.knative.dev"}}'
              kubectl patch configmap/config-domain -n knative-serving \
                --type merge -p '{"data":{"{{ .Values.knative.domain }}":""}}'
              kubectl patch service kourier -n kourier-system \
                --type merge -p '{"spec":{"type":"NodePort","ports":[{"name":"http2","port":80,"targetPort":8080,"nodePort":{{ .Values.knative.kourier.nodePort }},"protocol":"TCP"}]}}'
              echo "Knative Serving installed successfully!"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-installer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-installer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-1"
    "helm.sh/hook-delete-policy": hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: {{ .Release.Name }}-installer
    namespace: {{ .Release.Namespace }}
{{- end }}
